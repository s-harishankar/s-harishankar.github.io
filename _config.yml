# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage
lang: en

# Use modern timezone naming
timezone: Asia/Kolkata

# jekyll-seo-tag settings
# ↓ --------------------------

title: copium
tagline: "notes from the debug spiral"

description: >-
  Writing about backend systems, machine learning, security, developer tools,
  and the occasional software-induced existential crisis.

# Fill in the protocol & hostname for your site.
url: "https://s-harishankar.github.io"

github:
  username: s-harishankar

twitter:
  username:

social:
  name: Harishankar S
  email: hari.nair634@gmail.com
  links:
    - https://github.com/s-harishankar
    - https://www.linkedin.com/in/harishankar-s-203ab8136/
    - https://www.youtube.com/@theprogrammingchannel331

# Site Verification Settings
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Page views settings
pageviews:
  provider:

# Prefer color scheme setting.
# Empty means follow system preference and allow user toggle.
theme_mode:

# The CDN endpoint for media resources.
cdn:

# Sidebar avatar
# Recommend replacing this expiring LinkedIn image URL with a local asset later,
# e.g. /assets/img/avatar.jpg
avatar: https://media.licdn.com/dms/image/v2/C5603AQEw_6Tfi_Bk8w/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1659509669347?e=1735776000&v=beta&t=zOdvhRB7zJXQVxGLGzs15uN-Zsv_QxL2iBmh5O-C36o

# Site-wide social preview image for SEO
social_preview_image:

# Global TOC setting
toc: true

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# Self-hosted static assets
assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:
      # - "/example"

paginate: 10

# The base URL of your site
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
